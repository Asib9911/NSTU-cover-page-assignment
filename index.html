<!DOCTYPE html>
<html>
<head>
  <title>Cover Page Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Cover Page Generator</h2>

<div class="form">
  <input id="title" placeholder="Assignment Title">
  <input id="courseName" placeholder="Course Name">
  <input id="courseCode" placeholder="Course Code">

  <input id="studentName" placeholder="Student Name">
  <input id="studentId" placeholder="ID">
  <input id="year" placeholder="Year">
  <input id="term" placeholder="Term">

  <input id="teacherName" placeholder="Teacher Name">
  <input id="designation" placeholder="Designation">

  <input id="department" placeholder="Department Name">

  <button onclick="generate()">Generate</button>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="preview" class="page">

  <!-- TITLE -->
  <h1 id="pTitle" class="blue center"></h1>

  <!-- COURSE -->
  <p class="center"><span class="blue">Course Name:</span> <span id="pCourseName"></span></p>
  <p class="center"><span class="blue">Course Code:</span> <span id="pCourseCode"></span></p>

  <!-- TABLE -->
  <table>
    <tr class="blue">
      <th>Submitted by</th>
      <th>Submitted to</th>
    </tr>

    <tr>
      <!-- LEFT -->
      <td>
        <p><b id="pStudentName"></b></p>
        <p>ID: <b id="pStudentId"></b></p>
        <p>Year: <b id="pYear"></b></p>
        <p>Term: <b id="pTerm"></b></p>

        <p id="pDept1"></p>

        <p>Noakhali Science and Technology University</p>
        <p>Noakhali-3814, Bangladesh</p>
      </td>

      <!-- RIGHT -->
      <td>
        <p><b id="pTeacherName"></b></p>
        <p><b id="pDesignation"></b></p>

        <p id="pDept2"></p>

        <p>Noakhali Science and Technology University</p>
        <p>Noakhali-3814, Bangladesh</p>
      </td>
    </tr>
  </table>

  <!-- BOTTOM -->
  <div class="bottom">
    <img src="logo.png" class="logo">

    <h3 id="pDeptBottom"></h3>
    <h2>Noakhali Science and Technology University</h2>
  </div>

</div>

<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
